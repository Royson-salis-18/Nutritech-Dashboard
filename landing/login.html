<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriTech — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    :root { --accent:#22d3ee; --accent2:#818cf8; --bg:#050a14; --surface:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); --text:#f1f5f9; --muted:#94a3b8; }
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);display:grid;place-items:center;padding:1.25rem}
    .card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:1.25rem}
    .title{display:flex;align-items:center;gap:.6rem;font-weight:900;letter-spacing:.08em;color:var(--accent);margin-bottom:.75rem}
    .form-group{display:flex;flex-direction:column;gap:.35rem;margin:.6rem 0}
    label{font-size:.72rem;font-weight:800;color:var(--muted)}
    .input{width:100%;padding:.7rem .85rem;border-radius:.75rem;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text)}
    .btn{width:100%;padding:.75rem;border-radius:.85rem;border:none;background:var(--accent);color:#0b1220;font-weight:900;cursor:pointer;margin-top:.6rem}
    .hint{margin-top:.6rem;color:var(--muted);font-size:.8rem;text-align:center}
    .error{margin-top:.6rem;color:#fecaca;background:rgba(254,202,202,.1);border:1px solid rgba(254,202,202,.35);padding:.55rem .7rem;border-radius:.6rem;font-size:.85rem;display:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="title"><span class="material-symbols-outlined">lock</span> Secure Login</div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input id="email" type="email" class="input" placeholder="you@domain.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" class="input" placeholder="••••••••" required />
      </div>
      <button class="btn" id="submit-btn" type="submit">Sign In</button>
      <div id="error" class="error"></div>
      <div class="hint">Forgot password? Use Supabase Auth reset from your dashboard.</div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase anon details (safe for client usage)
    const SUPABASE_URL = "https://ciosgjvbflsnrkhbriqh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_VapU8vP433UngqaNKC9xIA_GgWByL9f";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Read redirect target from ?redirect=<url>, default to '/entry'
    const params = new URLSearchParams(location.search);
    const redirectTarget = params.get('redirect') || '/entry';

    const form = document.getElementById('login-form');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const btn = document.getElementById('submit-btn');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Authenticating...';
      try {
        const { data, error } = await client.auth.signInWithPassword({
          email: email.value.trim(),
          password: password.value
        });
        if (error) throw error;
        // Persist session token in localStorage for later use if needed
        if (data?.session?.access_token) {
          localStorage.setItem('nt_token', data.session.access_token);
        }
        // Redirect on success
        location.href = redirectTarget;
      } catch (err) {
        errorBox.textContent = err.message || 'Login failed';
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });
  </script>
  <script src="./assets/virtual-keyboard.js"></script>
</body>
</html>
